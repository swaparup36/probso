services:
  postgres:
    image: postgres:13
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: pdfvid
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d pdfvid"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:6
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: worker
    env_file:
      - ./worker/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  migrate:
    build:
      context: ./api-server
      dockerfile: Dockerfile
    env_file:
      - ./api-server/.env
    command: ["./api-server", "-migrate"]
    depends_on:
      postgres:
        condition: service_healthy

  api-server:
    build:
      context: ./api-server
      dockerfile: Dockerfile
    container_name: api-server
    ports:
      - "8080:8080"
    env_file:
      - ./api-server/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  ws-server:
    build:
      context: ./ws-server
      dockerfile: Dockerfile
    container_name: ws-server
    ports:
      - "9090:9090"
    env_file:
      - ./ws-server/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: app
    ports:
      - "3000:3000"
    env_file:
      - ./app/.env
    depends_on:
      - api-server
      - ws-server

volumes:
  db_data:
  redis_data: