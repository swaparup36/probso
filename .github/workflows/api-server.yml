name: Deploy api server

on:
  push:
    branches: [main]
    paths:
      - "api-server/**"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/probso-api-server:latest \
            ./api-server

      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/probso-api-server:latest

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.API_VM_IP }} >> ~/.ssh/known_hosts

      - name: Deploy to APP VM
        run: |
          ssh ubuntu@${{ secrets.API_VM_IP }} << 'EOF'
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/probso-api-server:latest
            docker stop probso-api-server || true
            docker rm probso-api-server || true
            docker run -d \
              --name probso-api-server \
              --env-file /etc/api-server/.env \
              -p 8080:8080 \
              --restart always \
              ${{ secrets.DOCKERHUB_USERNAME }}/probso-api-server:latest
          EOF