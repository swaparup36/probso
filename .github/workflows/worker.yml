name: Deploy worker

on:
  push:
    branches: [main]
    paths:
      - "worker/**"
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/probso-worker:latest \
            ./worker

      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/probso-worker:latest

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY_AWS }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.WORKER_VM_IP }} >> ~/.ssh/known_hosts

      - name: Deploy to WORKER VM
        run: |
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no ubuntu@${{ secrets.WORKER_VM_IP }} << 'EOF'
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/probso-worker:latest
            docker stop probso-worker || true
            docker rm probso-worker || true
            docker run -d \
              --name probso-worker \
              --env-file /etc/worker/.env \
              --restart always \
              ${{ secrets.DOCKERHUB_USERNAME }}/probso-worker:latest
            docker image prune -a -f --filter "until=24h"
          EOF