name: Deploy ws server

on:
  push:
    branches: [main]
    paths:
      - "ws-server/**"
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/probso-ws-server:latest \
            ./ws-server

      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/probso-ws-server:latest

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.WS_VM_IP }} >> ~/.ssh/known_hosts

      - name: Deploy to WS VM
        run: |
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no root@${{ secrets.WS_VM_IP }} << 'EOF'
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/probso-ws-server:latest
            docker stop probso-ws-server || true
            docker rm probso-ws-server || true
            docker run -d \
              --name probso-ws-server \
              --env-file /etc/ws-server/.env \
              -p 9090:9090 \
              --restart always \
              ${{ secrets.DOCKERHUB_USERNAME }}/probso-ws-server:latest
            docker image prune -a -f --filter "until=24h"
          EOF