name: Deploy web application

on:
  push:
    branches: [main]
    paths:
      - "app/**"
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Build Docker image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY="${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}" \
            --build-arg NEXT_PUBLIC_CLERK_SIGN_UP_URL="${{ secrets.NEXT_PUBLIC_CLERK_SIGN_UP_URL }}" \
            --build-arg NEXT_PUBLIC_CLERK_SIGN_UP_FALLBACK_REDIRECT_URL="${{ secrets.NEXT_PUBLIC_CLERK_SIGN_UP_FALLBACK_REDIRECT_URL }}" \
            --build-arg NEXT_PUBLIC_CLERK_SIGN_IN_FALLBACK_REDIRECT_URL="${{ secrets.NEXT_PUBLIC_CLERK_SIGN_IN_FALLBACK_REDIRECT_URL }}" \
            --build-arg NEXT_PUBLIC_CLERK_SIGN_IN_URL="${{ secrets.NEXT_PUBLIC_CLERK_SIGN_IN_URL }}" \
            --build-arg NEXT_PUBLIC_API_BASE_URL="${{ secrets.NEXT_PUBLIC_API_BASE_URL }}" \
            --build-arg NEXT_PUBLIC_WS_URL="${{ secrets.NEXT_PUBLIC_WS_URL }}" \
            --build-arg NEXT_PUBLIC_DODO_STARTER_PLAN_NAME="${{ secrets.NEXT_PUBLIC_DODO_STARTER_PLAN_NAME }}" \
            --build-arg NEXT_PUBLIC_DODO_CREATOR_PLAN_NAME="${{ secrets.NEXT_PUBLIC_DODO_CREATOR_PLAN_NAME }}" \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/probso-app:latest \
            ./app

      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/probso-app:latest

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" | tr -d '\r' > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.APP_VM_IP }} >> ~/.ssh/known_hosts

      - name: Deploy to APP VM
        run: |
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no root@${{ secrets.APP_VM_IP }} << 'EOF'
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/probso-app:latest
            docker stop probso-app || true
            docker rm probso-app || true
            docker run -d \
              --name probso-app \
              --env-file /etc/app/.env \
              -p 127.0.0.1:3000:3000 \
              --restart always \
              ${{ secrets.DOCKERHUB_USERNAME }}/probso-app:latest
            docker image prune -a -f --filter "until=24h"
          EOF
